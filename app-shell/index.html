<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Faolla</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #081121;
        color: #f8fafc;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      main {
        display: grid;
        gap: 12px;
        justify-items: center;
        padding: 24px;
        text-align: center;
      }

      .mark {
        display: grid;
        height: 64px;
        width: 64px;
        place-items: center;
        border-radius: 18px;
        background: #0f766e;
        font-size: 32px;
        font-weight: 900;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">F</div>
      <strong>Faolla 正在连接</strong>
      <p>如果网络不可用，请稍后再试。</p>
    </main>
  </body>
</html>
