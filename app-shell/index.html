<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Faolla</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #081121;
        color: #f8fafc;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      main {
        display: grid;
        gap: 14px;
        justify-items: center;
        padding: 24px;
        text-align: center;
      }

      .mark {
        display: grid;
        height: 72px;
        width: 72px;
        place-items: center;
        border-radius: 22px;
        background: #020617;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
        font-size: 34px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      strong {
        font-size: 18px;
        letter-spacing: 0.02em;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">FA</div>
      <strong>Faolla 正在启动</strong>
      <p>正在连接服务，请稍候。</p>
    </main>
  </body>
</html>
